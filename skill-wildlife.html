<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wildlife Photography | Skill Set | Rohan Eldhose Manjummekudiyil</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@700&f[]=satoshi@400;500;700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Outfit:wght@400;700;900&display=swap"
        rel="stylesheet">

    <!-- Local Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>

<body style="background: var(--bg-dark); color: var(--text-primary); margin: 0; font-family: 'Satoshi', sans-serif;">

    <header id="site-header" class="sticky-header" style="background: rgba(5,5,5,0.9); padding: 8px 20px; left: 30px; transform: none;">
        <div class="header-container"
            style="display: flex; justify-content: space-between; align-items: center; max-width: 1300px; margin: 0 auto;">
            <a href="index.html#skill-set" class="back-link"
                style="color: var(--primary-orange); text-decoration: none; font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; gap: 5px; opacity: 0.8; transition: opacity 0.3s ease;">
                <span style="font-size: 1.1rem;">←</span> BACK
            </a>
        </div>
    </header>

    <main style="padding: 120px 20px 60px; max-width: 1000px; margin: 0 auto;">
        <div class="glass-card" style="padding: 60px; border-radius: 30px; display: block;">

            <div style="font-size: 4rem; text-align: center; margin-bottom: 20px;">📸</div>
            <h1 class="gradient-text"
                style="font-size: 4rem; font-family: 'Clash Display', sans-serif; text-transform: uppercase; text-align: center; margin-bottom: 40px;">
                Wildlife Photography</h1>

            <style>
                .camera-container {
                    width: 100%;
                    height: 450px;
                    border-radius: 20px;
                    margin-bottom: 40px;
                    overflow: hidden;
                    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
                    background: #000;
                    position: relative;
                }
                
                .gallery-track {
                    display: flex;
                    gap: 15px;
                    padding: 15px 0;
                    width: max-content;
                    animation: scrollGallery 30s linear infinite;
                }

                .gallery-track:hover {
                    animation-play-state: paused;
                }

                .gallery-img {
                    width: 550px;
                    height: 420px;
                    object-fit: cover;
                    border-radius: 15px;
                    flex-shrink: 0;
                    transition: transform 0.4s ease, filter 0.4s ease;
                    filter: grayscale(40%);
                    cursor: pointer;
                }

                .gallery-img:hover {
                    transform: scale(1.03);
                    filter: grayscale(0%);
                    z-index: 10;
                }

                @keyframes scrollGallery {
                    0% { transform: translateX(0); }
                    100% { transform: translateX(calc(-565px * 8)); }
                }

                /* Modal Styles */
                .gallery-modal {
                    display: none;
                    position: fixed;
                    z-index: 99999;
                    left: 0;
                    top: 0;
                    width: 100%;
                    height: 100%;
                    background-color: rgba(0, 0, 0, 0.95);
                    backdrop-filter: blur(10px);
                    justify-content: center;
                    align-items: center;
                }
                .modal-content {
                    max-width: 90%;
                    max-height: 90%;
                    border-radius: 10px;
                    box-shadow: 0 0 50px rgba(255, 107, 0, 0.3);
                    animation: zoomIn 0.3s ease;
                }
                .close-modal {
                    position: absolute;
                    top: 30px;
                    right: 40px;
                    color: #fff;
                    font-size: 40px;
                    font-weight: bold;
                    cursor: pointer;
                    transition: color 0.3s;
                }
                .close-modal:hover {
                    color: var(--primary-orange);
                }
                @keyframes zoomIn {
                    from { transform: scale(0.8); opacity: 0; }
                    to { transform: scale(1); opacity: 1; }
                }

                /* Mobile view adjustments */
                @media (max-width: 768px) {
                    h1.gradient-text {
                        font-size: 2.5rem !important;
                    }
                    h3 {
                        font-size: 1.5rem !important;
                    }
                    p, ul li {
                        font-size: 1rem !important;
                        text-align: justify !important;
                    }
                    .glass-card {
                        padding: 30px 20px !important;
                    }
                    .camera-container {
                        height: 250px !important;
                    }
                    .gallery-img {
                        width: 300px !important;
                        height: 220px !important;
                    }
                    @keyframes scrollGallery {
                        0% { transform: translateX(0); }
                        100% { transform: translateX(calc(-315px * 8)); } /* Adjusted based on width + gap */
                    }
                }
            </style>
            <div class="camera-container">
                <div class="gallery-track">
                    <!-- Original 8 Images -->
                    <img src="wildlife new (1).jpeg" class="gallery-img" onclick="openModal(this.src)">
                    <img src="wildlife new (2).jpeg" class="gallery-img" onclick="openModal(this.src)">
                    <img src="wildlife new (3).jpeg" class="gallery-img" onclick="openModal(this.src)">
                    <img src="wildlife new (4).jpeg" class="gallery-img" onclick="openModal(this.src)">
                    <img src="wildlife new (5).jpeg" class="gallery-img" onclick="openModal(this.src)">
                    <img src="wildlife new (6).jpeg" class="gallery-img" onclick="openModal(this.src)">
                    <img src="wildlife new (7).jpeg" class="gallery-img" onclick="openModal(this.src)">
                    <img src="wildlife new (8).jpeg" class="gallery-img" onclick="openModal(this.src)">
                    <!-- Duplicated 8 Images for Seamless Infinite Scroll -->
                    <img src="wildlife new (1).jpeg" class="gallery-img" onclick="openModal(this.src)">
                    <img src="wildlife new (2).jpeg" class="gallery-img" onclick="openModal(this.src)">
                    <img src="wildlife new (3).jpeg" class="gallery-img" onclick="openModal(this.src)">
                    <img src="wildlife new (4).jpeg" class="gallery-img" onclick="openModal(this.src)">
                    <img src="wildlife new (5).jpeg" class="gallery-img" onclick="openModal(this.src)">
                    <img src="wildlife new (6).jpeg" class="gallery-img" onclick="openModal(this.src)">
                    <img src="wildlife new (7).jpeg" class="gallery-img" onclick="openModal(this.src)">
                    <img src="wildlife new (8).jpeg" class="gallery-img" onclick="openModal(this.src)">
                </div>
            </div>

            <div style="font-size: 1.2rem; line-height: 1.8; color: var(--text-secondary);">
                <p style="margin-bottom: 20px;">Wildlife photography is about more than just taking pictures—it's about
                    the patient pursuit of nature's most sincere moments. These images, captured from my recent
                    excursions, showcase the diversity and raw beauty of life in the wild.</p>
            </div>

        </div>
    </main>

    <!-- Modal for Gallery Lightbox -->
    <div id="imageModal" class="gallery-modal" onclick="closeModal()">
        <span class="close-modal">&times;</span>
        <img id="modalImg" class="modal-content">
    </div>

    <script>
        function openModal(src) {
            const modal = document.getElementById("imageModal");
            const modalImg = document.getElementById("modalImg");
            modal.style.display = "flex";
            modalImg.src = src;
            document.body.style.overflow = 'hidden'; // Prevent scrolling
        }

        function closeModal() {
            const modal = document.getElementById("imageModal");
            modal.style.display = "none";
            document.body.style.overflow = 'auto'; // Re-enable scrolling
        }
    </script>

</body>

</html>
